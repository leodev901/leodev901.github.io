# Next.js 사이트를 빌드하고 GitHub Pages에 배포하기 위한 기본 워크플로우
#
# Next.js 시작 가이드: https://nextjs.org/docs/getting-started
#
name: Deploy Next.js site to Github Pages

on:
  # 'main' 브랜치에 코드가 푸시(push)될 때 실행됩니다.
  push:
    branches: ["main"]

  # GitHub Actions 탭에서 수동으로 이 배포 작업을 실행할 수 있게 해줍니다.
  workflow_dispatch:

# GitHub Pages에 배포할 수 있도록 인증 토큰(GITHUB_TOKEN)의 권한을 설정합니다.
permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 여러 번 배포가 일어나는 것을 방지합니다. 
# 배포 대기열에 여러 개가 밀려있으면 최신 배포만 남기지만, 이미 진행 중인 배포는 중간에 취소하지 않고 끝까지 기다립니다.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 빌드 작업 (소스 코드를 배포용 정적 파일로 만드는 과정)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            echo "runner=yarn" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            echo "runner=npx --no-install" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager"
            exit 1
          fi
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ${{ steps.detect-package-manager.outputs.manager }}
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Next.js 설정에 basePath를 자동으로 넣어 경로가 깨지는 것을 막아주며
          # 서버 사이드용 이미지 최적화 기능을 끕니다. (GitHub Pages 같은 정적 서버는 지원 불가)
          #
          # 만약 next.config 직접 설정하고 싶다면 아래 라인(static_site_generator)을 지워도 됩니다.
          static_site_generator: next
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          # 사용하는 패키지나 소스 코드가 변경될 때마다 새로운 캐시를 생성해 저장합니다.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          # 소스만 바뀌고 패키지는 그대로라면, 이전에 썼던 캐시를 재활용해 빌드 속도를 높입니다.
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-
      - name: Install dependencies
        run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}
      - name: Build with Next.js
        run: ${{ steps.detect-package-manager.outputs.runner }} next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # 배포 작업 (완성된 결과물을 실제 GitHub Pages 서버에 올리는 과정)
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
